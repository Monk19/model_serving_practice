apiVersion: apps/v1
kind: deployment
metadata:
  labels:
    name: Housing-price-predictor
spec:
  replicas: 2
  selector:
    matchLabels:
      labels:
        app: predictor
  template:
    metadata:
      labels:
        app: predictor
  spec:
    containers:
    - name: predictor-api
      image:
      ports:
      - containerPort:8000
      
